<!DOCTYPE html>
<html>
<head>
  <title>Weather App</title>
</head>
<body style="text-align:center; font-family:Arial; background:#0f172a; color:white; padding:50px;">

<h1>🌦 Weather App</h1>

<input id="city" placeholder=" Baku ">
<button onclick="getWeather()">Axtar</button>

<div id="result"></div>

<script>
async function getWeather() {
  let city = document.getElementById("city").value;

  let res = await fetch(`https://wttr.in/${city}?format=j1`);
  let data = await res.json();

  document.getElementById("result").innerHTML = `
    <h2>${city}</h2>
    <p>🌡 Temp: ${data.current_condition[0].temp_C}°C</p>
    <p>${data.current_condition[0].weatherDesc[0].value}</p>
  `;
}
</script>

</body>
</html>
